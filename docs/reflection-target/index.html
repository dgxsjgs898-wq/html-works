<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#02070b">
  <title>反射打靶</title>
  <style>
    :root{--bg:#02070b;--panel:#06131a;--line:#163545;--cyan:#69c9ff;--blue:#318dff;--lime:#baff32;--amber:#ffb84b;--red:#ff4f57;--muted:#7190a2;--white:#edfaff}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;width:100%;height:100%;min-height:0;background:var(--bg);color:var(--white);font-family:Inter,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;overflow:hidden}
    body{display:flex;justify-content:center;background:radial-gradient(circle at 50% 35%,#071b24 0,#02070b 47%,#010305 100%);overscroll-behavior:none}
    .app{width:min(100%,520px);min-width:0;height:100dvh;min-height:0;max-height:100dvh;padding:max(10px,env(safe-area-inset-top)) 14px max(10px,env(safe-area-inset-bottom));display:grid;grid-template-rows:auto minmax(0,1fr) auto;gap:8px;position:relative;overflow:hidden}
    .app:before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.18;background-image:linear-gradient(rgba(70,180,230,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(70,180,230,.05) 1px,transparent 1px);background-size:32px 32px;mask-image:linear-gradient(transparent,#000 25%,#000 80%,transparent)}
    header{position:relative;z-index:2;min-width:0}
    .title-row{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin:0 4px 10px}
    h1{margin:0;font-size:clamp(25px,7vw,34px);line-height:1;font-weight:900;letter-spacing:.04em;text-shadow:0 0 22px rgba(105,201,255,.26)}
    h1 span{color:var(--lime)}
    .title-row>div:first-child{min-width:0}.subtitle{margin:5px 0 0;color:#8ca7b6;font-size:11px;line-height:1.45;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .live-dot{font-size:10px;color:var(--lime);letter-spacing:.14em;padding-bottom:2px}.live-dot:before{content:"";display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--lime);box-shadow:0 0 10px var(--lime);margin-right:6px}
    .scoreboard{display:grid;grid-template-columns:repeat(6,1fr);padding:9px 2px 8px;border-top:1px solid rgba(105,201,255,.24);border-bottom:1px solid rgba(105,201,255,.24);background:linear-gradient(90deg,transparent,rgba(15,42,54,.48),transparent)}
    .metric{text-align:center;min-width:0;position:relative}.metric:not(:last-child):after{content:"";position:absolute;right:0;top:5px;bottom:4px;width:1px;background:linear-gradient(transparent,rgba(105,201,255,.22),transparent)}
    .label{display:block;font-size:10px;color:#7292a5;letter-spacing:.1em;margin-bottom:3px}.value{display:block;font-size:clamp(15px,5vw,23px);font-weight:800;font-variant-numeric:tabular-nums;white-space:nowrap;overflow:hidden}.metric:nth-child(3) .value,.metric:nth-child(6) .value{color:var(--lime)}.metric:nth-child(5) .value{color:var(--amber)}
    .status{height:40px;margin-top:8px;display:flex;align-items:center;justify-content:center;position:relative;border:1px solid rgba(105,201,255,.19);clip-path:polygon(4% 0,96% 0,100% 26%,100% 74%,96% 100%,4% 100%,0 74%,0 26%);background:linear-gradient(90deg,rgba(7,24,32,.3),rgba(8,30,37,.92),rgba(7,24,32,.3));color:var(--cyan);font-size:16px;font-weight:800;letter-spacing:.12em;text-shadow:0 0 12px currentColor;transition:.25s}
    .status.close{color:var(--lime);border-color:rgba(186,255,50,.3)}.status.miss{color:var(--red);border-color:rgba(255,79,87,.3)}.status.win{color:var(--lime);border-color:rgba(186,255,50,.6);box-shadow:0 0 24px rgba(186,255,50,.12) inset}
    .stage-wrap{position:relative;min-width:0;min-height:0;overflow:hidden;border:1px solid rgba(83,180,235,.34);clip-path:polygon(12px 0,calc(100% - 12px) 0,100% 12px,100% calc(100% - 12px),calc(100% - 12px) 100%,12px 100%,0 calc(100% - 12px),0 12px);background:linear-gradient(180deg,rgba(4,18,25,.92),rgba(2,10,15,.98));box-shadow:inset 0 0 30px rgba(22,120,180,.08),0 0 26px rgba(0,0,0,.4)}
    .stage-wrap:after{content:"拖动 P 左右调整";position:absolute;top:10px;left:50%;transform:translateX(-50%);font-size:10px;color:#53798e;letter-spacing:.13em;pointer-events:none}
    canvas{display:block;width:100%;height:100%;touch-action:none;cursor:grab}canvas.dragging{cursor:grabbing}
    .controls{padding:2px 9% 0;display:flex;flex-direction:column;align-items:center;gap:8px;position:relative;z-index:2}
    button{font:inherit;border:0;color:inherit;cursor:pointer}
    .primary{width:100%;height:58px;border-radius:14px;position:relative;overflow:hidden;background:linear-gradient(135deg,#d4ff48,#aaf528);color:#071006;font-size:23px;font-weight:950;letter-spacing:.18em;box-shadow:0 0 0 1px rgba(218,255,109,.65),0 7px 24px rgba(164,239,35,.2),inset 0 2px 0 rgba(255,255,255,.5);transition:transform .12s,filter .2s,opacity .2s}
    .primary:before{content:"";position:absolute;inset:0;background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,.48) 48%,transparent 65%);transform:translateX(-120%)}.primary:not(:disabled):active{transform:translateY(2px) scale(.985)}.primary:not(:disabled):hover{filter:brightness(1.08)}.primary.firing:before{animation:sweep .55s ease}.primary:disabled{cursor:default;opacity:.68}.primary.next{background:linear-gradient(135deg,#69dfff,#318dff);color:#03111a;box-shadow:0 0 0 1px rgba(117,219,255,.7),0 7px 24px rgba(49,141,255,.25)}
    @keyframes sweep{to{transform:translateX(120%)}}
    .reset{background:none;color:#66899c;font-size:12px;letter-spacing:.16em;padding:5px 12px}.reset:hover{color:#a8d8ee}
    @media (max-height:840px){.app{padding-top:7px;padding-bottom:7px;gap:6px}.subtitle{display:none}.title-row{margin-bottom:5px}h1{font-size:25px}.scoreboard{padding:5px 2px}.label{margin-bottom:1px}.status{height:32px;margin-top:5px;font-size:14px}.controls{gap:3px}.primary{height:48px;font-size:20px}.reset{padding:3px 12px}.stage-wrap:after{top:7px}}
    @media (max-height:650px){.live-dot{display:none}.title-row{margin-bottom:3px}.scoreboard{padding:3px 2px}.status{height:29px}.primary{height:43px}.reset{font-size:10px}}
    @media (min-width:700px){body{padding:18px}.app{height:calc(100dvh - 36px);max-height:min(920px,calc(100dvh - 36px));border:1px solid rgba(105,201,255,.12);border-radius:24px;background:rgba(0,5,8,.72);box-shadow:0 30px 80px #000;overflow:hidden}}
    @media (prefers-reduced-motion:reduce){*,*:before,*:after{animation-duration:.01ms!important;animation-iteration-count:1!important;scroll-behavior:auto!important}}
  </style>
</head>
<body>
<main class="app" aria-label="反射打靶游戏">
  <header>
    <div class="title-row"><div><h1>反射<span>打靶</span></h1><p class="subtitle">拖动镜面上的点，发射，尽量用最少次数命中目标。</p></div><div class="live-dot">READY</div></div>
    <section class="scoreboard" aria-label="本局数据">
      <div class="metric"><span class="label">轮次</span><span class="value" id="round">1</span></div>
      <div class="metric"><span class="label">次数</span><span class="value" id="tries">0</span></div>
      <div class="metric"><span class="label">偏离</span><span class="value" id="offset">--</span></div>
      <div class="metric"><span class="label">误差</span><span class="value" id="error">--</span></div>
      <div class="metric"><span class="label">积分</span><span class="value" id="score">100</span></div>
      <div class="metric"><span class="label">最佳</span><span class="value" id="best">--</span></div>
    </section>
    <div class="status" id="status" role="status" aria-live="polite">准备发射</div>
  </header>
  <section class="stage-wrap" id="stageWrap"><canvas id="game" aria-label="拖动镜面上的 P 点，然后点击发射"></canvas></section>
  <footer class="controls"><button class="primary" id="action">发射</button><button class="reset" id="reset">重置比分</button></footer>
</main>
<script>
(()=>{
  'use strict';
  const canvas=document.getElementById('game'),wrap=document.getElementById('stageWrap'),ctx=canvas.getContext('2d');
  const action=document.getElementById('action'),reset=document.getElementById('reset'),statusEl=document.getElementById('status');
  const els={round:document.getElementById('round'),tries:document.getElementById('tries'),offset:document.getElementById('offset'),error:document.getElementById('error'),score:document.getElementById('score'),best:document.getElementById('best')};
  const state={w:390,h:500,dpr:1,round:1,tries:0,score:100,best:Infinity,won:false,busy:false,drag:false,A:{x:80,y:100},B:{x:300,y:130},pX:195,mirrorY:390,shot:null,beam:0,burst:0,particles:[],audio:null};
  const HIT=12;
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
  const rand=(a,b)=>a+Math.random()*(b-a);
  function resize(){const r=wrap.getBoundingClientRect();state.w=r.width;state.h=r.height;state.dpr=Math.min(devicePixelRatio||1,2);canvas.width=Math.round(r.width*state.dpr);canvas.height=Math.round(r.height*state.dpr);ctx.setTransform(state.dpr,0,0,state.dpr,0,0);state.mirrorY=state.h*.78;state.pX=clamp(state.pX,34,state.w-34);if(!state.shot&&!state.drag&&state.tries===0)state.pX=state.w/2;}
  function theoreticalP(A,B){const da=state.mirrorY-A.y,db=state.mirrorY-B.y;return(A.x*db+B.x*da)/(da+db)}
  function makeRound(){let A,B,p,guard=0;do{const top=state.h*.12,bottom=state.h*.48;A={x:rand(48,state.w-48),y:rand(top,bottom)};B={x:rand(48,state.w-48),y:rand(top,bottom)};p=theoreticalP(A,B);guard++}while((Math.abs(A.x-B.x)<state.w*.32||p<42||p>state.w-42)&&guard<200);state.A=A;state.B=B;state.pX=state.w/2;state.tries=0;state.won=false;state.busy=false;state.shot=null;state.beam=0;state.burst=0;state.particles=[];action.textContent='发射';action.className='primary';setStatus('准备发射','');sync('--','--')}
  function sync(off,err){els.round.textContent=state.round;els.tries.textContent=state.tries;els.offset.textContent=off;els.error.textContent=err;els.score.textContent=state.score;els.best.textContent=Number.isFinite(state.best)?state.best.toFixed(1):'--'}
  function setStatus(text,kind){statusEl.textContent=text;statusEl.className='status'+(kind?' '+kind:'')}
  function initAudio(){if(!state.audio){const AC=window.AudioContext||window.webkitAudioContext;if(AC){state.audio=new AC();const c=state.audio.createDynamicsCompressor();c.threshold.value=-14;c.knee.value=7;c.ratio.value=10;c.attack.value=.002;c.release.value=.22;c.connect(state.audio.destination);state.audioBus=c}}if(state.audio?.state==='suspended')state.audio.resume()}
  function tone(freq,start,dur,type='sine',gain=.08,end=freq){if(!state.audio)return;const a=state.audio,o=a.createOscillator(),g=a.createGain();o.type=type;o.frequency.setValueAtTime(freq,a.currentTime+start);o.frequency.exponentialRampToValueAtTime(Math.max(20,end),a.currentTime+start+dur);g.gain.setValueAtTime(.001,a.currentTime+start);g.gain.exponentialRampToValueAtTime(gain,a.currentTime+start+.008);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+start+dur);o.connect(g).connect(state.audioBus);o.start(a.currentTime+start);o.stop(a.currentTime+start+dur+.02)}
  function noise(start,dur,gain=.1,highpass=false){if(!state.audio)return;const a=state.audio,n=Math.ceil(a.sampleRate*dur),b=a.createBuffer(1,n,a.sampleRate),d=b.getChannelData(0);for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*(1-i/n);const s=a.createBufferSource(),f=a.createBiquadFilter(),g=a.createGain();s.buffer=b;f.type=highpass?'highpass':'lowpass';f.frequency.value=highpass?1300:520;g.gain.setValueAtTime(gain,a.currentTime+start);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+start+dur);s.connect(f).connect(g).connect(state.audioBus);s.start(a.currentTime+start)}
  function punch(ok){const key=ok?[{transform:'scale(1)',filter:'brightness(1)'},{transform:'scale(1.018)',filter:'brightness(1.8)'},{transform:'scale(1)',filter:'brightness(1)'}]:[{transform:'translateX(0)'},{transform:'translateX(-7px)'},{transform:'translateX(6px)'},{transform:'translateX(-4px)'},{transform:'translateX(0)'}];wrap.animate(key,{duration:ok?420:260,easing:'ease-out'});statusEl.animate([{opacity:.45},{opacity:1}],{duration:280,iterations:ok?3:2})}
  function sound(ok){initAudio();if(ok){tone(105,0,.34,'sine',.23,42);noise(0,.13,.14,true);tone(360,.015,.18,'sawtooth',.13,720);tone(520,.13,.18,'square',.11,780);tone(720,.24,.2,'triangle',.14,1080);tone(980,.36,.32,'sine',.16,1560);tone(1310,.48,.38,'triangle',.12,1840);navigator.vibrate?.([90,35,120,45,180])}else{tone(150,0,.3,'sawtooth',.19,58);tone(82,.015,.38,'sine',.24,38);tone(230,.08,.2,'square',.12,92);noise(0,.18,.13,false);navigator.vibrate?.([120,45,150])}punch(ok)}
  function fire(){if(state.busy||state.won)return;initAudio();state.busy=true;state.tries++;const dy=state.mirrorY-state.A.y;const hitX=state.pX+(state.pX-state.A.x)*(state.mirrorY-state.B.y)/dy;const raw=hitX-state.B.x,abs=Math.abs(raw),ok=abs<=HIT,shown=(raw>=0?'+':'')+raw.toFixed(1),shownAbs=abs.toFixed(1);state.shot={hitX,raw,ok};state.beam=0;action.disabled=true;action.classList.add('firing');state.best=Math.min(state.best,abs);if(ok){state.score+=20;state.won=true;state.burst=1;sync(shown,shownAbs);setStatus(`命中！第 ${state.tries} 次成功`,'win');spawnBurst(state.B.x,state.B.y);sound(true)}else{state.score-=10;sync(shown,shownAbs);if(abs<30)setStatus('很接近！','close');else setStatus(raw<0?'偏左了':'偏右了','miss');sound(false)}const start=performance.now();function anim(t){state.beam=clamp((t-start)/560,0,1);if(state.beam<1)requestAnimationFrame(anim);else{state.busy=false;action.disabled=false;action.classList.remove('firing');if(ok){action.textContent='下一轮';action.classList.add('next')}}}requestAnimationFrame(anim)}
  function next(){state.round++;makeRound()}
  function resetGame(){state.round=1;state.score=100;state.best=Infinity;makeRound()}
  function pointerX(e){const r=canvas.getBoundingClientRect();return(e.clientX-r.left)*state.w/r.width}
  canvas.addEventListener('pointerdown',e=>{if(state.busy||state.won)return;const x=pointerX(e);if(Math.abs(x-state.pX)<58){state.drag=true;canvas.classList.add('dragging');canvas.setPointerCapture(e.pointerId);state.shot=null;state.beam=0;setStatus('松手后发射','')}});
  canvas.addEventListener('pointermove',e=>{if(!state.drag)return;e.preventDefault();state.pX=clamp(pointerX(e),30,state.w-30)});
  function endDrag(e){if(!state.drag)return;state.drag=false;canvas.classList.remove('dragging');try{canvas.releasePointerCapture(e.pointerId)}catch{}setStatus('准备发射','')}
  canvas.addEventListener('pointerup',endDrag);canvas.addEventListener('pointercancel',endDrag);
  action.addEventListener('click',()=>state.won?next():fire());reset.addEventListener('click',()=>{initAudio();resetGame()});
  function line(x1,y1,x2,y2,color,width=2,alpha=1){ctx.save();ctx.globalAlpha=alpha;ctx.strokeStyle=color;ctx.lineWidth=width;ctx.shadowColor=color;ctx.shadowBlur=10;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}
  function glowDot(x,y,r,color){ctx.save();ctx.shadowColor=color;ctx.shadowBlur=20;ctx.fillStyle=color;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.fillStyle='#efffff';ctx.beginPath();ctx.arc(x,y,r*.38,0,Math.PI*2);ctx.fill();ctx.restore()}
  function target(x,y){ctx.save();ctx.translate(x,y);ctx.strokeStyle=state.won?'#d7ff5c':'#baff32';ctx.lineWidth=2.4;ctx.shadowColor=ctx.strokeStyle;ctx.shadowBlur=state.won?24:12;for(const r of [8,17,27]){ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.stroke()}ctx.fillStyle=ctx.strokeStyle;ctx.beginPath();ctx.arc(0,0,4,0,Math.PI*2);ctx.fill();ctx.restore();label('目标',x,y-39,'#caff52','center')}
  function label(text,x,y,color,align='left',size=13){ctx.save();ctx.font=`700 ${size}px system-ui,"PingFang SC"`;ctx.textAlign=align;ctx.textBaseline='middle';ctx.fillStyle=color;ctx.shadowColor=color;ctx.shadowBlur=8;ctx.fillText(text,x,y);ctx.restore()}
  function grid(){ctx.save();ctx.strokeStyle='rgba(66,150,192,.11)';ctx.lineWidth=1;const step=Math.max(38,state.w/9);for(let x=step;x<state.w;x+=step){ctx.beginPath();ctx.moveTo(x,34);ctx.lineTo(x,state.h-12);ctx.stroke()}for(let y=58;y<state.h;y+=step){ctx.beginPath();ctx.moveTo(10,y);ctx.lineTo(state.w-10,y);ctx.stroke()}ctx.restore()}
  function drawMirror(){const y=state.mirrorY;ctx.save();const g=ctx.createLinearGradient(0,y,state.w,y);g.addColorStop(0,'rgba(43,141,210,.2)');g.addColorStop(.5,'#79d8ff');g.addColorStop(1,'rgba(43,141,210,.2)');ctx.strokeStyle=g;ctx.lineWidth=2;ctx.shadowColor='#54beff';ctx.shadowBlur=12;ctx.beginPath();ctx.moveTo(12,y);ctx.lineTo(state.w-12,y);ctx.stroke();ctx.shadowBlur=0;ctx.fillStyle='rgba(80,190,255,.08)';ctx.fillRect(12,y+4,state.w-24,5);ctx.restore();label('镜面',state.w-22,y-15,'#7edbff','right',11)}
  function drawP(){const pulse=state.drag?1.12:1;const r=20*pulse;ctx.save();ctx.translate(state.pX,state.mirrorY);ctx.shadowColor='#6fcaff';ctx.shadowBlur=state.drag?28:16;ctx.fillStyle='#08305a';ctx.strokeStyle='#e8fbff';ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.strokeStyle='#4ca8ff';ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,r+6,0,Math.PI*2);ctx.stroke();ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';ctx.font='900 18px system-ui';ctx.fillText('P',0,1);ctx.restore()}
  function drawShot(){if(!state.shot)return;const s=state.shot,p=state.beam;const ax=state.A.x,ay=state.A.y,px=state.pX,py=state.mirrorY,hx=s.hitX,hy=state.B.y;const d1=Math.hypot(px-ax,py-ay),d2=Math.hypot(hx-px,hy-py),total=d1+d2,travel=p*total;if(travel<=d1){const q=travel/d1;line(ax,ay,ax+(px-ax)*q,ay+(py-ay)*q,'#72c9ff',3)}else{line(ax,ay,px,py,'#72c9ff',3);const q=(travel-d1)/d2;line(px,py,px+(hx-px)*q,py+(hy-py)*q,s.ok?'#baff32':'#aeeeff',3)}if(p>=1){glowDot(hx,hy,5,s.ok?'#baff32':'#ff4f57');if(!s.ok){line(Math.min(hx,state.B.x),hy,Math.max(hx,state.B.x),hy,'#ff4f57',2,.95);ctx.save();ctx.setLineDash([4,5]);line(hx,hy,hx,state.mirrorY,'#ff4f57',1,.4);ctx.restore()}}}
  function spawnBurst(x,y){for(let i=0;i<34;i++){const a=Math.random()*Math.PI*2,sp=rand(35,130);state.particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,size:rand(1,3)})}}
  let last=performance.now();function particles(dt){for(const p of state.particles){p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=.97;p.vy*=.97;p.life-=dt*1.5;ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=Math.random()>.45?'#dfff72':'#68d5ff';ctx.fillRect(p.x,p.y,p.size,p.size)}ctx.globalAlpha=1;state.particles=state.particles.filter(p=>p.life>0)}
  function draw(t){const dt=Math.min((t-last)/1000,.04);last=t;ctx.clearRect(0,0,state.w,state.h);grid();drawMirror();drawShot();glowDot(state.A.x,state.A.y,10,'#69c9ff');label('A 光源',state.A.x,state.A.y-25,'#7dd8ff','center');target(state.B.x,state.B.y);drawP();particles(dt);requestAnimationFrame(draw)}
  new ResizeObserver(resize).observe(wrap);resize();makeRound();requestAnimationFrame(draw);
})();
</script>
</body>
</html>
