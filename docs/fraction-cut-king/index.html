<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#02070b">
  <title>分数切割王</title>
  <style>
    :root{--bg:#02070b;--cyan:#68d5ff;--lime:#baff32;--orange:#ffad32;--red:#ff5261;--white:#eefbff;--muted:#7092a4}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--white);font-family:Inter,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}
    body{display:flex;justify-content:center;background:radial-gradient(circle at 50% 42%,#0a2227,#02070b 55%,#010304);overscroll-behavior:none}
    .app{width:min(100%,520px);height:100dvh;padding:max(9px,env(safe-area-inset-top)) 14px max(9px,env(safe-area-inset-bottom));display:grid;grid-template-rows:auto minmax(0,1fr) auto;gap:7px;overflow:hidden}
    header{min-width:0}.title-row{display:flex;align-items:flex-end;justify-content:space-between;margin:0 3px 8px;gap:8px}h1{margin:0;font-size:clamp(25px,7vw,34px);line-height:1;font-weight:950;letter-spacing:.04em;text-shadow:0 0 20px rgba(104,213,255,.25)}h1 span{color:var(--lime)}
    .subtitle{margin:5px 0 0;color:#88a5b5;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.live{color:var(--lime);font-size:10px;letter-spacing:.12em}.live:before{content:"";display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--lime);box-shadow:0 0 10px var(--lime);margin-right:6px}
    .score{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));padding:8px 1px;border-block:1px solid rgba(104,213,255,.22);background:linear-gradient(90deg,transparent,rgba(14,44,55,.46),transparent)}.metric{text-align:center;min-width:0;position:relative}.metric:not(:last-child):after{content:"";position:absolute;right:0;top:4px;bottom:3px;width:1px;background:rgba(104,213,255,.16)}.label{display:block;color:#7395a7;font-size:9px;letter-spacing:.08em}.value{display:block;font-size:clamp(14px,4.8vw,22px);font-weight:850;font-variant-numeric:tabular-nums;white-space:nowrap;overflow:hidden}.metric:nth-child(3) .value,.metric:nth-child(6) .value{color:var(--lime)}.metric:nth-child(5) .value{color:var(--orange)}
    .status{height:38px;margin-top:7px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(104,213,255,.2);clip-path:polygon(4% 0,96% 0,100% 28%,100% 72%,96% 100%,4% 100%,0 72%,0 28%);background:linear-gradient(90deg,rgba(5,21,28,.3),rgba(8,32,40,.94),rgba(5,21,28,.3));color:var(--cyan);font-size:15px;font-weight:850;letter-spacing:.1em;text-shadow:0 0 12px currentColor}.status.close{color:var(--lime);border-color:rgba(186,255,50,.38)}.status.miss{color:var(--red);border-color:rgba(255,82,97,.38)}.status.win{color:var(--lime);border-color:rgba(186,255,50,.7);box-shadow:inset 0 0 28px rgba(186,255,50,.12)}
    .stage{min-height:0;position:relative;overflow:hidden;border:1px solid rgba(83,180,235,.34);clip-path:polygon(12px 0,calc(100% - 12px) 0,100% 12px,100% calc(100% - 12px),calc(100% - 12px) 100%,12px 100%,0 calc(100% - 12px),0 12px);background:linear-gradient(180deg,rgba(5,21,28,.96),rgba(2,10,15,.99));box-shadow:inset 0 0 32px rgba(30,130,180,.08)}canvas{display:block;width:100%;height:100%;touch-action:none;cursor:grab}canvas.drag{cursor:grabbing}
    .controls{padding:1px 9% 0;display:flex;flex-direction:column;align-items:center;gap:6px}button{font:inherit;border:0;cursor:pointer}.primary{width:100%;height:56px;border-radius:14px;background:linear-gradient(135deg,#d7ff55,#a8f526);color:#071006;font-size:22px;font-weight:950;letter-spacing:.18em;box-shadow:0 0 0 1px rgba(220,255,116,.65),0 7px 24px rgba(170,244,40,.22),inset 0 2px rgba(255,255,255,.5);transition:.15s}.primary:active{transform:translateY(2px) scale(.985)}.primary:disabled{opacity:.65}.primary.next{background:linear-gradient(135deg,#69ddff,#318dff)}.reset{background:none;color:#658a9d;font-size:11px;letter-spacing:.14em;padding:4px 12px}
    @media(max-height:840px){.app{padding-top:6px;padding-bottom:6px;gap:5px}.subtitle{display:none}.title-row{margin-bottom:4px}h1{font-size:25px}.score{padding:4px 1px}.status{height:31px;margin-top:4px;font-size:13px}.primary{height:47px;font-size:19px}.controls{gap:2px}.reset{padding:2px 12px}}
    @media(max-height:620px){.live{display:none}.status{height:28px}.primary{height:42px}.reset{font-size:9px}}
    @media(min-width:700px){body{padding:18px}.app{height:calc(100dvh - 36px);max-height:min(920px,calc(100dvh - 36px));border:1px solid rgba(104,213,255,.13);border-radius:24px;background:rgba(0,5,8,.72);box-shadow:0 30px 80px #000}}
  </style>
</head>
<body>
<main class="app" aria-label="分数切割王游戏">
  <header>
    <div class="title-row"><div><h1>分数<span>切割王</span></h1><p class="subtitle">固定一条半径，转动另一条，切出目标扇形。</p></div><div class="live">READY</div></div>
    <section class="score" aria-label="游戏数据">
      <div class="metric"><span class="label">轮次</span><span class="value" id="round">1</span></div>
      <div class="metric"><span class="label">刀数</span><span class="value" id="tries">0</span></div>
      <div class="metric"><span class="label">目标</span><span class="value" id="target">3/8</span></div>
      <div class="metric"><span class="label">实际</span><span class="value" id="actual">--</span></div>
      <div class="metric"><span class="label">积分</span><span class="value" id="score">100</span></div>
      <div class="metric"><span class="label">最佳</span><span class="value" id="best">--</span></div>
    </section>
    <div class="status" id="status" role="status" aria-live="polite">目标：切出 3/8</div>
  </header>
  <section class="stage" id="stage"><canvas id="game" aria-label="拖动圆周上的半径手柄并点击落刀"></canvas></section>
  <footer class="controls"><button class="primary" id="action">落刀</button><button class="reset" id="reset">重置比分</button></footer>
</main>
<script>
(()=>{'use strict';
  const $=id=>document.getElementById(id),canvas=$('game'),ctx=canvas.getContext('2d'),stage=$('stage'),action=$('action'),statusEl=$('status');
  const els={round:$('round'),tries:$('tries'),target:$('target'),actual:$('actual'),score:$('score'),best:$('best')};
  const targets=[['1/2',.5],['1/3',1/3],['1/4',.25],['2/5',.4],['3/8',.375],['5/8',.625],['2/3',2/3],['3/4',.75],['1/5',.2],['2/7',2/7]];
  const TAU=Math.PI*2,FIXED=-Math.PI/2,S={w:390,h:500,dpr:1,round:1,tries:0,score:100,best:Infinity,target:targets[4],angle:.8,drag:false,cut:null,won:false,busy:false,particles:[],audio:null,bus:null};
  const HIT=.012,clamp=(v,a,b)=>Math.max(a,Math.min(b,v)),rand=(a,b)=>a+Math.random()*(b-a);
  function resize(){const r=stage.getBoundingClientRect();S.w=r.width;S.h=r.height;S.dpr=Math.min(devicePixelRatio||1,2);canvas.width=Math.round(S.w*S.dpr);canvas.height=Math.round(S.h*S.dpr);ctx.setTransform(S.dpr,0,0,S.dpr,0,0)}
  function circle(){return{x:S.w/2,y:S.h*.5,r:Math.min(S.w*.31,S.h*.33)}}
  function norm(a){return((a%TAU)+TAU)%TAU}
  function span(){return norm(S.angle-FIXED)}
  function setStatus(t,k=''){statusEl.textContent=t;statusEl.className='status'+(k?' '+k:'')}
  function sync(){els.round.textContent=S.round;els.tries.textContent=S.tries;els.target.textContent=S.target[0];els.actual.textContent=S.cut?(S.cut.ratio*100).toFixed(1)+'%':'--';els.score.textContent=S.score;els.best.textContent=Number.isFinite(S.best)?(S.best*100).toFixed(1)+'%':'--'}
  function newRound(){S.target=targets[Math.floor(Math.random()*targets.length)];S.tries=0;S.won=false;S.busy=false;S.angle=FIXED+rand(.45,TAU-.45);S.cut=null;action.textContent='落刀';action.className='primary';setStatus('目标：切出 '+S.target[0]);sync()}
  function audio(){if(!S.audio){const AC=window.AudioContext||window.webkitAudioContext;if(AC){S.audio=new AC();S.bus=S.audio.createDynamicsCompressor();S.bus.threshold.value=-14;S.bus.ratio.value=10;S.bus.connect(S.audio.destination)}}if(S.audio?.state==='suspended')S.audio.resume()}
  function tone(f,st,d,type='sine',g=.1,end=f){if(!S.audio)return;const o=S.audio.createOscillator(),v=S.audio.createGain(),t=S.audio.currentTime;o.type=type;o.frequency.setValueAtTime(f,t+st);o.frequency.exponentialRampToValueAtTime(end,t+st+d);v.gain.setValueAtTime(.001,t+st);v.gain.exponentialRampToValueAtTime(g,t+st+.008);v.gain.exponentialRampToValueAtTime(.001,t+st+d);o.connect(v).connect(S.bus);o.start(t+st);o.stop(t+st+d+.02)}
  function noise(g=.12){if(!S.audio)return;const n=S.audio.sampleRate*.15,b=S.audio.createBuffer(1,n,S.audio.sampleRate),d=b.getChannelData(0);for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*(1-i/n);const s=S.audio.createBufferSource(),v=S.audio.createGain();s.buffer=b;v.gain.value=g;s.connect(v).connect(S.bus);s.start()}
  function sound(ok){audio();noise(ok?.14:.1);if(ok){tone(100,0,.3,'sine',.22,42);tone(390,.02,.18,'sawtooth',.13,720);tone(680,.17,.2,'triangle',.14,1050);tone(980,.34,.34,'sine',.16,1650);navigator.vibrate?.([90,35,120,45,180])}else{tone(150,0,.3,'sawtooth',.19,58);tone(75,.02,.35,'sine',.23,38);navigator.vibrate?.([120,45,150])}stage.animate(ok?[{filter:'brightness(1)'},{filter:'brightness(1.9)',transform:'scale(1.015)'},{filter:'brightness(1)',transform:'scale(1)'}]:[{transform:'translateX(0)'},{transform:'translateX(-7px)'},{transform:'translateX(6px)'},{transform:'translateX(0)'}],{duration:ok?420:260})}
  function burst(){const c=center();for(let i=0;i<34;i++){const a=Math.random()*Math.PI*2,sp=rand(45,150);S.particles.push({x:c.x,y:c.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,l:1})}}
  function cutNow(){if(S.busy||S.won)return;audio();S.busy=true;S.tries++;const ratio=span()/TAU,err=ratio-S.target[1],abs=Math.abs(err),ok=abs<=HIT;S.best=Math.min(S.best,abs);S.cut={ratio,err,progress:0};if(ok){S.score+=20;S.won=true;setStatus(`精准切割！误差 ${(abs*100).toFixed(1)}%`,'win');burst()}else{S.score-=10;setStatus(abs<.035?'很接近！':err<0?'切少了':'切多了',abs<.035?'close':'miss')}sync();sound(ok);action.disabled=true;const t0=performance.now();function ani(t){S.cut.progress=clamp((t-t0)/360,0,1);if(S.cut.progress<1)requestAnimationFrame(ani);else{S.busy=false;action.disabled=false;if(ok){action.textContent='下一块';action.classList.add('next')}}}requestAnimationFrame(ani)}
  function center(){return{x:S.w/2,y:S.h*.5}}
  function point(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*S.w/r.width,y:(e.clientY-r.top)*S.h/r.height}}
  function setAngle(p){const c=circle();S.angle=Math.atan2(p.y-c.y,p.x-c.x);if(span()<.035)S.angle=FIXED+.035}
  canvas.addEventListener('pointerdown',e=>{if(S.busy||S.won)return;S.drag=true;S.cut=null;canvas.classList.add('drag');canvas.setPointerCapture(e.pointerId);setAngle(point(e));setStatus('正在估计扇形大小')});
  canvas.addEventListener('pointermove',e=>{if(!S.drag)return;e.preventDefault();setAngle(point(e))});
  function end(e){if(!S.drag)return;S.drag=null;canvas.classList.remove('drag');try{canvas.releasePointerCapture(e.pointerId)}catch{}setStatus('目标：切出 '+S.target[0])}canvas.addEventListener('pointerup',end);canvas.addEventListener('pointercancel',end);
  action.addEventListener('click',()=>S.won?(S.round++,newRound()):cutNow());$('reset').addEventListener('click',()=>{audio();S.round=1;S.score=100;S.best=Infinity;newRound()});
  function grid(){ctx.save();ctx.strokeStyle='rgba(70,166,205,.1)';for(let x=35;x<S.w;x+=45){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,S.h);ctx.stroke()}for(let y=45;y<S.h;y+=45){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(S.w,y);ctx.stroke()}ctx.restore()}
  function piece(a0,a1,fill,stroke,dx=0,dy=0){const c=circle();ctx.save();ctx.translate(dx,dy);ctx.beginPath();ctx.moveTo(c.x,c.y);ctx.arc(c.x,c.y,c.r,a0,a1,false);ctx.closePath();ctx.fillStyle=fill;ctx.shadowColor=stroke;ctx.shadowBlur=18;ctx.fill();ctx.lineWidth=3;ctx.strokeStyle=stroke;ctx.stroke();ctx.restore()}
  function drawFood(){const c=circle(),sp=span(),mid=FIXED+sp/2;if(S.cut){const d=12*S.cut.progress,dx=Math.cos(mid)*d,dy=Math.sin(mid)*d;piece(S.angle,FIXED+TAU,'rgba(255,112,35,.7)','#ff824d',-dx*.25,-dy*.25);piece(FIXED,FIXED+sp,'rgba(255,157,41,.92)','#baff32',dx,dy)}else{ctx.save();ctx.fillStyle='rgba(255,132,34,.78)';ctx.strokeStyle='#ffb742';ctx.lineWidth=4;ctx.shadowColor='#ffb742';ctx.shadowBlur=20;ctx.beginPath();ctx.arc(c.x,c.y,c.r,0,TAU);ctx.fill();ctx.stroke();ctx.restore();piece(FIXED,FIXED+sp,'rgba(186,255,50,.18)','#baff32')};ctx.save();ctx.strokeStyle='rgba(255,235,170,.35)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(c.x,c.y,c.r*.88,0,TAU);ctx.stroke();ctx.restore()}
  function drawKnife(){const c=circle(),fx=c.x+Math.cos(FIXED)*c.r,fy=c.y+Math.sin(FIXED)*c.r,mx=c.x+Math.cos(S.angle)*c.r,my=c.y+Math.sin(S.angle)*c.r;ctx.save();ctx.lineWidth=4;ctx.shadowBlur=15;ctx.shadowColor='#68d5ff';ctx.strokeStyle='#68d5ff';ctx.beginPath();ctx.moveTo(c.x,c.y);ctx.lineTo(fx,fy);ctx.stroke();ctx.shadowColor='#baff32';ctx.strokeStyle='#baff32';ctx.beginPath();ctx.moveTo(c.x,c.y);ctx.lineTo(mx,my);ctx.stroke();ctx.fillStyle='#eaffff';ctx.beginPath();ctx.arc(c.x,c.y,7,0,TAU);ctx.fill();ctx.fillStyle='#baff32';ctx.beginPath();ctx.arc(mx,my,15,0,TAU);ctx.fill();ctx.fillStyle='#07110b';ctx.beginPath();ctx.arc(mx,my,7,0,TAU);ctx.fill();ctx.font='800 11px system-ui';ctx.textAlign='center';ctx.fillStyle='#68d5ff';ctx.fillText('固定边',fx,fy-12);ctx.fillStyle='#baff32';ctx.fillText('拖这里',mx,my-21);ctx.restore()}
  let last=performance.now();function particles(dt){for(const p of S.particles){p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=.97;p.vy*=.97;p.l-=dt*1.6;ctx.globalAlpha=Math.max(0,p.l);ctx.fillStyle=Math.random()>.5?'#baff32':'#68d5ff';ctx.fillRect(p.x,p.y,3,3)}ctx.globalAlpha=1;S.particles=S.particles.filter(p=>p.l>0)}
  function draw(t){const dt=Math.min((t-last)/1000,.04);last=t;ctx.clearRect(0,0,S.w,S.h);grid();ctx.fillStyle='#7395a7';ctx.font='700 11px system-ui';ctx.textAlign='center';ctx.fillText('固定蓝色半径 · 拖动绿色半径估计扇形',S.w/2,19);drawFood();drawKnife();if(S.cut){ctx.fillStyle=S.cut.err>0?'#ff6975':'#baff32';ctx.font='900 24px system-ui';ctx.fillText((S.cut.ratio*100).toFixed(1)+'%',S.w/2,S.h-22)}particles(dt);requestAnimationFrame(draw)}
  new ResizeObserver(resize).observe(stage);resize();newRound();sync();requestAnimationFrame(draw);
})();
</script>
</body>
</html>
